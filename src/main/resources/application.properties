spring.application.name=neatly-server
spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8080}
server.address=0.0.0.0

# --- Datasource (Supabase Postgres) — set via env / IDE ---
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Supabase PgBouncer (port 6543, transaction pool): avoid "prepared statement S_x does not exist"
# by disabling server-side named prepared statements on pooled connections.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Supabase (API / JWT) ---
# API JWT: JWKS + issuer (rule.md). Optional supabase.jwt.secret only for spring.profiles.active=test (see application-test.properties).
supabase.url=${SUPABASE_URL:}
supabase.api-key=${SUPABASE_API_KEY:}
supabase.bucket=${SUPABASE_BUCKET:Profile-Admin}
supabase.jwks.url=${SUPABASE_JWKS_URL:}
supabase.jwt.issuer=${SUPABASE_JWT_ISSUER:}
supabase.jwt.secret=${SUPABASE_JWT_SECRET:}

# --- Stripe ---
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# --- Gemini (server-side only) ---
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}

# --- Multipart upload limits ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# --- CORS (comma-separated origins) ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- Actuator (Render health) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# --- Logging (override via LOGGING_LEVEL_* ) ---
logging.level.com.neatly=${LOGGING_LEVEL_COM_NEATLY:INFO}